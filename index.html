<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/svg+xml" href="/nfc.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nfc-card-editor</title>
    
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const TARGET_COLOR = '#00F0FF'; 

        fetch('/nfc.svg')
          .then(response => response.text())
          .then(svgText => {
            const coloredSvg = svgText.replace(/stroke="[^"]+"/, `stroke="${TARGET_COLOR}"`);
            
            const blob = new Blob([coloredSvg], { type: 'image/svg+xml' });
            const blobUrl = URL.createObjectURL(blob);
            
            document.getElementById('nfc').setAttribute('href', blobUrl);
          })
          .catch(err => console.error('Error modifying nfc color:', err));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
